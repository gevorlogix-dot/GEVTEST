name: Oregon API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Runs every day at 05:00 UTC = 09:00 Yerevan time (UTC+4)
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run API test suite
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          OREGON_BASE_URL:      ${{ secrets.OREGON_BASE_URL }}
          OREGON_AUTH_EMAIL:    ${{ secrets.OREGON_AUTH_EMAIL }}
          OREGON_AUTH_PASSWORD: ${{ secrets.OREGON_AUTH_PASSWORD }}
        run: pytest

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_number }}
          path: report.html
          retention-days: 30
