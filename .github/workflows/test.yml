name: Oregon API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Runs every day at 06:00 UTC — catches API regressions overnight
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allows manual run from the GitHub Actions UI

jobs:
  test:
    name: Run API test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OREGON_BASE_URL:     ${{ secrets.OREGON_BASE_URL }}
          OREGON_AUTH_EMAIL:   ${{ secrets.OREGON_AUTH_EMAIL }}
          OREGON_AUTH_PASSWORD: ${{ secrets.OREGON_AUTH_PASSWORD }}
          # OREGON_AUTH_TOKEN is intentionally omitted so CI always does a fresh login.
          # REPORT_ID / VEHICLE_ID are generated dynamically by the suite.
        run: pytest

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_number }}
          path: report.html
          retention-days: 30
